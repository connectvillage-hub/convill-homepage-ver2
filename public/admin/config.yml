# 로컬 dev 환경에서만 활성화됨 — Decap CMS의 기본 allowed_hosts가
# localhost / 127.0.0.1 이라, 라이브 배포된 사이트에선 자동 무시되고
# 아래 backend(github) 인증이 사용됨. 그래서 그대로 둬도 안전.
local_backend: true

backend:
  name: github
  repo: connectvillage-hub/convill-homepage-ver2
  branch: main
  # OAuth 프록시 — Vercel Function (api/auth, api/callback)이 GitHub OAuth 중계.
  # base_url 생략 = 현재 접속 도메인 자동 사용 (다중 도메인 지원: vercel.app + 새 도메인 모두)
  # 환경변수 OAUTH_GITHUB_CLIENT_ID / OAUTH_GITHUB_CLIENT_SECRET 가 Vercel에 설정되어 있어야 함.
  auth_endpoint: api/auth
  commit_messages:
    create: '콘텐츠 신규 등록: {{collection}} - {{slug}}'
    update: '콘텐츠 수정: {{collection}} - {{slug}}'
    delete: '콘텐츠 삭제: {{collection}} - {{slug}}'
    uploadMedia: '이미지 업로드: {{path}}'
    deleteMedia: '이미지 삭제: {{path}}'

# 모든 변경사항을 미리 검토할 수 있는 PR 워크플로
publish_mode: editorial_workflow

# 이미지 업로드 경로
media_folder: public/uploads
public_folder: /uploads

# 사이트 미리보기 URL
site_url: https://convill-homepage-ver2.vercel.app
display_url: https://convill-homepage-ver2.vercel.app
logo_url: https://convill-homepage-ver2.vercel.app/images/main.png

locale: ko

# ============================================================
# 컬렉션 정의
# ============================================================
collections:

  # =================== 매거진 ===================
  - name: magazine
    label: 매거진
    label_singular: 매거진 글
    folder: src/content/magazine
    create: true
    extension: md
    format: yaml-frontmatter
    slug: "{{fields.id}}"
    identifier_field: title
    summary: "[{{id}}] {{title}}"
    sortable_fields: [publishDate, id, title]
    editor:
      preview: true
    fields:
      # ━━━━━━━━━━ 시스템 ━━━━━━━━━━
      - { name: id, label: '글 번호 (좌측 목록의 마지막 [번호] +1)', widget: string, hint: '⚠️ 새로 만들 때: 왼쪽 매거진 목록에서 마지막 항목의 [번호]를 확인 → +1 입력. 예: 마지막이 [09]면 "10" 입력. 두 자리 숫자 필수', pattern: ['^\d{2}$', '두 자리 숫자만 (예: 02, 10, 99)'] }

      # ━━━━━━━━━━ ① 페이지 상단 작은 글씨 (eyebrow) ━━━━━━━━━━
      - { name: category, label: '① 카테고리', widget: string, hint: '🔝 페이지 최상단 작은 글씨 좌측. 예: "CHURCH SPACE", "CHURCH INTERIOR"' }
      - { name: publishDate, label: '① 발행일', widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, picker_utc: false, hint: '🔝 페이지 최상단 작은 글씨 중간' }
      - { name: readingTime, label: '① 읽는 시간', widget: string, hint: '🔝 페이지 최상단 작은 글씨 우측. 예: "6분 읽기"' }

      # ━━━━━━━━━━ ② 헤더 (제목 영역) ━━━━━━━━━━
      - { name: title, label: '② 제목 (h1)', widget: text, hint: '📰 페이지 헤더의 큰 글씨. 엔터로 줄바꿈 가능' }
      - { name: dek, label: '② 부제 (제목 아래 회색 글씨)', widget: text, hint: '📰 제목 바로 아래. 엔터로 줄바꿈 가능' }

      # ━━━━━━━━━━ ③ 대표 이미지 (헤더 아래) ━━━━━━━━━━
      - { name: heroImage, label: '③ 대표 이미지', widget: image, choose_url: true, hint: '🖼️ 헤더 바로 아래 큰 가로 이미지. 업로드 또는 외부 URL' }
      - { name: heroImageAlt, label: '③ 대표 이미지 설명 (alt — 검색 노출)', widget: string, hint: '🔍 Google 이미지 검색 노출용. 화면엔 안 보이지만 검색 SEO에 중요' }

      # ━━━━━━━━━━ ④ 본문 첫 단락 (lead) ━━━━━━━━━━
      - { name: lead, label: '④ 첫 단락 (강조 표시 단락)', widget: text, hint: '📝 본문의 첫 번째 강조 단락. 본문 블록보다 위에 큰 글씨로 표시. 엔터로 줄바꿈 가능' }

      # ━━━━━━━━━━ ⑤ 본문 ━━━━━━━━━━
      - name: sections
        label: '⑤ 본문 블록'
        widget: list
        collapsed: true
        hint: '📝 새 글에는 기본 구조 9개 블록이 미리 채워져 있습니다. 각 블록을 클릭해서 펼쳐서 입력. 우측 X로 삭제, 위/아래 화살표로 순서 조정, "+ ADD"로 추가'
        summary: '{{fields.type}} — {{fields.text}}{{fields.alt}}{{fields.afterAlt}}'
        default:
          - { type: heading, level: h2, text: '' }
          - { type: paragraph, text: '' }
          - { type: ba, beforeSrc: '', beforeAlt: '', afterSrc: '', afterAlt: '' }
          - { type: heading, level: h2, text: '' }
          - { type: paragraph, text: '' }
          - { type: figure, src: '', alt: '' }
          - { type: heading, level: h2, text: '' }
          - { type: paragraph, text: '' }
          - { type: quote, text: '' }
        types:
          # ── 제목 ──
          - name: heading
            label: '🔖 제목 (h2/h3)'
            widget: object
            collapsed: false
            summary: '제목: {{fields.text}}'
            fields:
              - { name: level, label: 단계, widget: select, options: [h2, h3], default: h2, hint: 'h2=큰 제목 / h3=작은 제목' }
              - { name: text, label: 제목 내용, widget: text, hint: '엔터로 줄바꿈 가능' }

          # ── 단락 (마크다운 에디터 — 인라인 굵게/기울임/링크 GUI 가능) ──
          - name: paragraph
            label: '✏️ 단락 (텍스트)'
            widget: object
            collapsed: false
            summary: '단락: {{fields.text}}'
            fields:
              - name: text
                label: 본문 텍스트
                widget: markdown
                minimal: true
                buttons: [bold, italic, link, quote, bulleted-list, numbered-list]
                editor_components: []
                modes: [rich_text, raw]
                hint: '도구바로 굵게/기울임/링크 적용. 폰트 크기/색상은 raw 모드에서 <span style="font-size:24px; color:red">텍스트</span> 같이 입력'

          # ── 리스트 ──
          - name: list
            label: '📋 리스트 (불릿/번호)'
            widget: object
            collapsed: false
            summary: '리스트 {{fields.items.length}}개'
            fields:
              - { name: style, label: 종류, widget: select, options: [ul, ol], default: ul, hint: 'ul=점 / ol=숫자' }
              - { name: items, label: 항목들, widget: list, field: { name: item, label: 항목, widget: text, hint: '엔터로 줄바꿈 가능' } }

          # ── 단일 이미지 ──
          - name: figure
            label: '🖼️ 사진 + 캡션 (단일 이미지)'
            widget: object
            collapsed: false
            summary: '사진: {{fields.alt}}'
            fields:
              - { name: src, label: 이미지 파일, widget: image }
              - { name: alt, label: '🔍 이미지 설명 (SEO 필수)', widget: string, hint: 'Google 이미지 검색 노출용. 사진 내용을 한 문장으로. 예: "교회 천장 간접조명 인테리어 설계 — 컨빌디자인"' }
              - { name: caption, label: 캡션 (사진 아래 글, 선택), widget: text, required: false }

          # ── Before/After ──
          - name: ba
            label: '🔄 Before/After 슬라이더'
            widget: object
            collapsed: false
            summary: 'BA: {{fields.afterAlt}}'
            fields:
              - { name: beforeSrc, label: '시공 전 이미지', widget: image }
              - { name: beforeAlt, label: '🔍 시공 전 alt (SEO 필수)', widget: string, hint: '예: "광주월성교회 본당 시공 전 사진"' }
              - { name: afterSrc, label: '시공 후 이미지', widget: image }
              - { name: afterAlt, label: '🔍 시공 후 alt (SEO 필수)', widget: string, hint: '예: "광주월성교회 본당 시공 후 사진 — 컨빌디자인"' }

          # ── 인용 ──
          - name: quote
            label: '💬 인용 (blockquote)'
            widget: object
            collapsed: false
            summary: '인용: {{fields.text}}'
            fields:
              - { name: text, label: 인용 문구, widget: text }

          # ── 링크 카드/줄 ──
          - name: link
            label: '🔗 링크 (텍스트 + URL)'
            widget: object
            collapsed: false
            summary: '링크: {{fields.text}} → {{fields.href}}'
            fields:
              - { name: text, label: 링크 표시 텍스트, widget: string, hint: '예: "컨빌 교회 인테리어 설계 사례 보기"' }
              - { name: href, label: 링크 URL, widget: string, hint: '내부 링크는 /portfolio_detail01.html 형식, 외부는 https://...' }
              - { name: title, label: 'title 속성 (선택)', widget: string, required: false }

          # ── 구분선 ──
          - name: divider
            label: '➖ 구분선 (가로줄/빈공간)'
            widget: object
            collapsed: false
            summary: '구분선: {{fields.style}}'
            fields:
              - { name: style, label: 종류, widget: select, options: [line, dashed, dotted, space], default: line, hint: 'line=얇은 가로줄 / dashed=점선 / dotted=점들 / space=그냥 빈 공간 (선 X)' }

          # ── 갤러리 (여러 이미지) ──
          - name: gallery
            label: '🖼️🖼️ 갤러리 (이미지 여러 개 그리드)'
            widget: object
            collapsed: false
            summary: '갤러리 {{fields.images.length}}장 ({{fields.cols}}열)'
            fields:
              - name: cols
                label: 한 줄당 이미지 수
                widget: select
                default: 2
                value_type: int
                hint: '2=반/반 (2열), 3=3열, 4=4열. 이미지를 4장 넣고 2열로 하면 자동으로 2x2 그리드가 됨'
                options:
                  - { label: '2열 (반/반)', value: 2 }
                  - { label: '3열', value: 3 }
                  - { label: '4열', value: 4 }
              - name: images
                label: 이미지 목록
                widget: list
                summary: '🖼️ {{fields.alt}}'
                fields:
                  - { name: src, label: 이미지 파일, widget: image }
                  - { name: alt, label: '🔍 이미지 설명 (SEO 필수)', widget: string, hint: '예: "광주월성교회 본당 우측 단상 사진"' }
                  - { name: caption, label: 캡션 (이미지 아래 글, 선택), widget: text, required: false }

          # ── 설명+이미지 한 묶음 ──
          - name: text-image
            label: '📰 설명 + 이미지 (한 묶음)'
            widget: object
            collapsed: false
            summary: '페어: {{fields.alt}}'
            fields:
              - { name: text, label: 설명 텍스트, widget: text, hint: '이미지 위쪽에 표시될 단락. 엔터로 줄바꿈 가능' }
              - { name: src, label: 이미지 파일, widget: image }
              - { name: alt, label: '🔍 이미지 설명 (SEO 필수)', widget: string }
              - { name: caption, label: 캡션 (사진 아래 글, 선택), widget: text, required: false }

      # ━━━━━━━━━━ ⑥ 페이지 하단 태그 ━━━━━━━━━━
      - { name: tags, label: '⑥ 태그 (페이지 하단)', widget: list, default: [], hint: '🏷️ 본문 끝 회색 알약 버튼들. 예: 청년 사역, 교회 공간 등' }

      # ━━━━━━━━━━ ⑦ SEO (화면에 안 보이는 메타) ━━━━━━━━━━
      - name: seo
        label: '⑦ SEO (화면에 안 보임 — 검색·공유용)'
        widget: object
        collapsed: true
        hint: '🔍 Google·네이버 검색 결과와 카카오톡·페이스북 공유 시 보이는 정보. 화면에는 표시되지 않습니다'
        fields:
          - { name: description, label: '메타 설명 (Google 검색 회색 글씨)', widget: text, hint: '🔍 검색 결과에 표시될 1~2문장 설명. 100~150자 권장' }
          - { name: keywords, label: '키워드 (쉼표로 구분, 선택)', widget: string, required: false, hint: '🔍 예: "교회 인테리어, 예배당 디자인"' }
          - { name: coverImage, label: '매거진 목록 페이지 카드 썸네일 (4:3 권장)', widget: image, required: false, choose_url: true, hint: '🖼️ /magazine.html 목록의 그리드 카드 이미지. 미지정 시 대표 이미지 자동 사용' }
          - { name: ogImage, label: 'SNS 공유 미리보기 이미지 (카톡·페이스북)', widget: image, required: false, choose_url: true, hint: '📱 1200x630 권장. 미지정 시 대표 이미지 자동 사용' }

  # =================== 포트폴리오 ===================
  - name: portfolio
    label: 포트폴리오
    label_singular: 포트폴리오 사례
    folder: src/content/portfolio
    create: true
    extension: md
    format: yaml-frontmatter
    slug: "{{fields.id}}"
    identifier_field: id
    summary: "[{{id}}] {{church.name}}"
    sortable_fields: [displayOrder, id]
    fields:
      # ─── 1) 기본 정보 ───
      - { name: id, label: '① 사례 번호 (좌측 목록의 마지막 [번호] +1)', widget: string, hint: '⚠️ 새로 만들 때: 왼쪽 포트폴리오 목록에서 마지막 항목의 [번호]를 확인 → +1 입력. 예: 마지막이 [08]이면 "09" 입력. URL이 portfolio_detail{번호}.html이 됩니다', pattern: ['^\d{2}$', '두 자리 숫자만 (01~99)'] }
      - { name: displayOrder, label: '① 목록 정렬 순서', widget: number, default: 99, value_type: int, hint: '🏛 포트폴리오 목록 페이지의 그리드 순서. 작을수록 위 (1=맨 위, 99=맨 아래)' }
      - { name: isFeatured, label: '① 대표 사례 (Featured)', widget: boolean, default: false, hint: '⭐ 포트폴리오 목록 페이지 상단 큰 카드(Featured Project)에 표시. 한 사이트에 1개만 권장' }

      # ─── 2) 교회 정보 ───
      - name: church
        label: '② 교회 정보 (히어로 메타 + Info Bar에 표시)'
        widget: object
        collapsed: false
        fields:
          - { name: name, label: 교회명, widget: string, hint: '📍 히어로 영역 하단 + Info Bar의 CHURCH 칸에 표시. 예: "광주월성교회"' }
          - { name: location, label: 위치 (지역), widget: string, hint: '📍 Info Bar의 LOCATION 칸 + SEO 지역 정보. 예: "광주광역시"' }
          - { name: projectType, label: 프로젝트 종류, widget: string, hint: '📍 Info Bar의 TYPE 칸. 예: "본당 리모델링", "지하 예배당 리모델링"' }
          - { name: scale, label: 규모/면적, widget: text, hint: '📍 히어로 영역 + Info Bar의 SCALE 칸에 함께 표시. 예: "약 50평 예배당 공간 포함" (여러 줄 가능, <br>로 줄바꿈)' }
          - { name: period, label: 시공 연도, widget: string, hint: '📍 히어로 + Info Bar의 PERIOD 칸. 예: "2024"' }

      # ─── 3) 헤더 (페이지 상단) ───
      - name: heading
        label: '③ 헤더 — 페이지 상단 큰 제목'
        widget: object
        collapsed: false
        fields:
          - { name: title, label: 메인 제목 (h1), widget: text, hint: '📋 페이지 가장 위 큰 글씨. 줄바꿈은 <br>로. 예: "은혜의 물결이 흐르는 본당,<br>친화적인 교회의 시작"' }
          - { name: breadcrumb, label: 경로 표시 (Breadcrumb), widget: string, hint: '🍞 페이지 최상단 경로 "Home / Portfolio / [여기]"의 마지막 텍스트. 짧게. 예: "친화적인 교회의 시작"' }

      # ─── 4) 본문 콘텐츠 ───
      - name: content
        label: '④ 본문 콘텐츠 — 페이지 중앙 본문'
        widget: object
        collapsed: false
        fields:
          - { name: intro, label: 프로젝트 소개 (인트로), widget: text, hint: '✏️ "— PROJECT NOTE" 섹션의 첫 단락. 2~3문장으로 프로젝트 개요' }

          - name: beforeAfters
            label: Before/After 슬라이더 (좌우 드래그)
            widget: list
            required: false
            summary: '↔️ {{fields.afterAlt}}'
            hint: '🔄 "BEFORE & AFTER" 섹션. 시공 전/후 이미지 쌍을 여러 개 추가 가능. 사용자가 마우스로 좌우 드래그해서 비교'
            fields:
              - { name: before, label: '시공 전 이미지', widget: image }
              - { name: after, label: '시공 후 이미지', widget: image }
              - { name: beforeAlt, label: '시공 전 alt (검색용)', widget: string, hint: 'Google 이미지 검색 노출. 예: "광주월성교회 본당 시공 전 사진"' }
              - { name: afterAlt, label: '시공 후 alt (검색용)', widget: string }

          - name: gallery
            label: 갤러리 (사진 + 캡션)
            widget: list
            required: false
            summary: '🖼️ {{fields.images[0].src}}'
            label_singular: 사진 묶음 (한 줄에 1~2장)
            hint: '📸 본문 갤러리. 한 줄에 1장(전체 폭) 또는 2장 배치. 사진마다 캡션(설명) 추가 가능'
            fields:
              - name: images
                label: 이미지 (한 줄에 1~2장)
                widget: list
                summary: '{{fields.src}}'
                fields:
                  - { name: src, label: 이미지 파일, widget: image }
                  - { name: caption, label: 캡션 (사진 아래 설명), widget: text, required: false }
                  - { name: isFull, label: 한 줄 단독 (전체 폭)?, widget: boolean, default: false, hint: '체크하면 이 사진이 가로 전체를 차지' }
                  - { name: alt, label: 이미지 alt (검색용, 선택), widget: string, required: false }

      # ─── 5) 목회자 후기 (선택) ───
      - name: testimony
        label: "⑤ 목회자 후기 (PASTOR'S WORDS 섹션)"
        widget: object
        required: false
        collapsed: true
        hint: '💬 (선택) 본문 하단 인용 박스. 작성하지 않으면 섹션 자체가 표시 안 됨'
        fields:
          - { name: quote, label: 인용 문구, widget: text, hint: '큰따옴표로 둘러쌓인 큰 텍스트로 표시' }
          - { name: author, label: 출처 (교회명/이름), widget: string, hint: '인용 아래 작은 글씨로. 예: "광주월성교회"' }
          - name: youtube
            label: 유튜브 영상 (인용 아래 카드)
            widget: object
            required: false
            collapsed: true
            hint: '🎥 (선택) 후기 아래에 유튜브 영상 카드 표시'
            fields:
              - { name: url, label: 유튜브 영상 URL, widget: string, hint: '예: https://youtu.be/XXXXX' }
              - { name: title, label: 영상 제목 (카드에 표시), widget: string }
              - { name: thumbnail, label: 영상 썸네일 이미지, widget: image }
              - { name: duration, label: 재생 시간, widget: string, hint: '예: "18:06"' }

      # ─── 6) 관련 프로젝트 ───
      - { name: relatedIds, label: '⑥ 관련 프로젝트 카드 (페이지 하단)', widget: list, required: false, hint: '🔗 페이지 하단 "RELATED PROJECTS" 섹션에 표시될 다른 사례 번호. 3개 추천. 예: ["02", "05", "06"]', default: [] }

      # ─── 7) SEO (자동 처리, 필요시만 수정) ───
      - name: seo
        label: '⑦ SEO (검색엔진 노출 — 안 적으면 자동)'
        widget: object
        collapsed: true
        hint: '🔍 Google/네이버 검색에 노출되는 정보. 메타 설명만 필수, 나머지는 자동 처리'
        fields:
          - { name: description, label: 메타 설명 (필수), widget: text, hint: '🔍 Google 검색 결과의 회색 설명 텍스트. 1~2문장, 100~150자' }
          - { name: keywords, label: 키워드 (검색용, 선택), widget: string, required: false, hint: '쉼표로 구분. 예: "광주월성교회, 교회 인테리어"' }
          - { name: ogTitle, label: 'SNS 공유 제목 (카카오톡/페이스북)', widget: string, required: false, hint: '비우면 ③헤더 제목 자동 사용' }
          - { name: ogDescription, label: 'SNS 공유 설명', widget: text, required: false, hint: '비우면 메타 설명 자동 사용' }
          - { name: ogImage, label: 'SNS 공유 미리보기 이미지', widget: image, required: false, choose_url: true, hint: '비우면 ⑧리스트 카드 이미지 자동 사용. 1200x630 권장' }

      # ─── 8) 리스트 카드 (포트폴리오 목록 페이지에 표시) ───
      - name: listCard
        label: '⑧ 리스트 카드 (포트폴리오 목록 그리드)'
        widget: object
        collapsed: false
        hint: '🏛 포트폴리오 목록 페이지(/portfolio_list.html)의 작은 카드'
        fields:
          - { name: image, label: 카드 썸네일 (4:3 권장), widget: image, hint: '🖼️ 목록 그리드에 표시될 사각형 이미지' }
          - { name: subtitle, label: 카드 아래 부제, widget: string, hint: '카드 hover 시 제목 아래 작은 글씨. 예: "광주월성교회 · 50평"' }
          - { name: title, label: 카드 제목 (선택), widget: text, required: false, hint: '비우면 ③헤더 제목 자동 사용 (br 제거). 다르게 보이고 싶을 때만 입력' }

  # =================== 유튜브 영상 ===================
  - name: youtube
    label: 유튜브 영상
    label_singular: 영상
    folder: src/content/youtube
    create: true
    extension: yaml
    format: yaml
    slug: "{{fields.id}}"
    identifier_field: title
    summary: "[{{id}}] {{title}}"
    sortable_fields: [displayOrder, id]
    fields:
      - { name: id, label: '영상 번호 (좌측 목록의 마지막 [번호] +1)', widget: string, hint: '⚠️ 새로 만들 때: 왼쪽 유튜브 영상 목록에서 마지막 항목의 [번호]를 확인 → +1 입력. 예: 마지막이 [06]이면 "07" 입력', pattern: ['^\d{2}$', '두 자리 숫자만'] }
      - { name: displayOrder, label: 표시 순서, widget: number, default: 99, value_type: int }
      - { name: url, label: 유튜브 URL, widget: string, hint: 'https://youtu.be/... 형식' }
      - { name: title, label: 영상 제목, widget: string }
      - { name: thumbnail, label: 썸네일 이미지, widget: image }
      - { name: duration, label: 재생 시간, widget: string, hint: '예: "2:08"' }
